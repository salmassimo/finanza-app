services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       finanza_db
      POSTGRES_USER:     finanza_user
      POSTGRES_PASSWORD: finanza_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanza_user -d finanza_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://finanza_user:finanza_pass@db:5432/finanza_db
      SECRET_KEY:   finanza-app-secret-key-2024
      ACCESS_TOKEN_EXPIRE_MINUTES: "43200"
      DEBUG:        "true"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "19006:19006"
      - "19000:19000"
      - "19001:19001"
    environment:
      EXPO_DEVTOOLS_LISTENING: "1"
      REACT_NATIVE_PACKAGER_HOSTNAME: "0.0.0.0"
    command: ["npm", "run", "web", "--", "--host", "lan", "--port", "19006"]
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
